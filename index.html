    /* ========================================== */

    }
    p {
      text-align: center;
      font-size: 14px;
      color: #666666;
      margin-bottom: 25px;
    }

    /* ========================================== */
    /* 🤖 ベイマックス アニメーションエリア       */
    /* ========================================== */
    .character-box {
      display: flex;
      align-items: center;
      margin-bottom: 25px;
      gap: 15px;
      background-color: #fff;
      padding: 10px 5px;
      border-radius: 16px;
    }
    .baymax {
      width: 65px;
      height: 55px;
      background: #ffffff;
      border: 2px solid #e2e8f0;
      border-radius: 50% 50% 48% 48%;
      position: relative;
      flex-shrink: 0;
      box-shadow: 0 4px 8px rgba(0,0,0,0.04);
      animation: floatBaymax 3.0s ease-in-out infinite;
    }
    .baymax-eyes {
      position: absolute;
      width: 7px;
      height: 7px;
      background: #222222;
      border-radius: 50%;
      top: 24px;
      left: 16px;
      box-shadow: 24px 0 0 #222222;
    }
    .baymax-eyes::after {
      content: '';
      position: absolute;
      width: 25px;
      height: 2px;
      background: #222222;
      top: 3px;
      left: 3px;
    }
    .balloon {
      position: relative;
      background: #ffffff;
      border: 2px solid #e2e8f0;
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: bold;
      color: #475569;
      flex-grow: 1;
      animation: floatBalloon 3.0s ease-in-out infinite;
    }
    .balloon::after {
      content: '';
      position: absolute;
      left: -10px;
      top: 20px;
      border-width: 5px 10px 5px 0;
      border-style: solid;
      border-color: transparent #ffffff transparent transparent;
      z-index: 2;
    }
    .balloon::before {
      content: '';
      position: absolute;
      left: -13px;
      top: 19px;
      border-width: 6px 11px 6px 0;
      border-style: solid;
      border-color: transparent #e2e8f0 transparent transparent;
      z-index: 1;
    }

    @keyframes floatBaymax {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    @keyframes floatBalloon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    /* ========================================== */
    /* 1. 目次画面用のスタイル（ピクトグラム付）   */
    /* ========================================== */
    .menu-list {
      list-style: none;
      padding: 0;
      margin: 25px 0;
    }
    .menu-item {
      margin-bottom: 15px;
    }

    .menu-btn:hover {

    .stage-badge {

      color: #ef4444;

      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
    }
    .progress-container {
      background-color: #f1f5f9;
      height: 10px;
      border-radius: 5px;
      overflow: hidden;
      flex-grow: 1;
    }
    .progress-bar {
      background-color: #0ea5e9;
      height: 100%;
      width: 0%;
      transition: width 0.4s ease;
    }
    .progress-text {
      font-size: 13px;
      font-weight: bold;
      color: #64748b;
      white-space: nowrap;
    }
    
    .favorite-btn {
      background: none;
      border: none;
      font-size: 26px;
      cursor: pointer;
      color: #cbd5e1;
      transition: transform 0.2s, color 0.2s;
      padding: 0 5px;
      line-height: 1;
    }
    .favorite-btn:hover {
      transform: scale(1.15);
    }
    .favorite-btn.active {
      color: #eab308;
      filter: drop-shadow(0 2px 4px rgba(234, 179, 8, 0.2));
    }

    .case-box {

      font-weight: bold;
      margin-bottom: 25px;
      color: #1e293b;
      background-color: #fff;

    .choices-grid {

    }
    .choice-button {

      font-size: 15px;
      text-align: left;
      font-weight: bold;

    }
    .choice-button:hover:not(:disabled) {

      border-color: #cbd5e1;
      transform: translateY(-2px);
    }
    .choice-button:disabled {
      cursor: not-allowed;
    }
    
    .choice-button.correct-flash {
      background-color: #f0fdf4 !important;
      border-color: #86efac !important;
      color: #166534 !important;
    }

    }

    .feedback-box {

  }

<!-- 気管支喘息：呼吸（息吹）を感じるデザイン -->

<li class="menu-item">
  <button class="menu-btn" onclick="startQuiz('thyroid.json')">

      <li class="menu-item">
        <button class="menu-btn review-btn" onclick="startReviewMode()">
          <span class="btn-icon">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="#fef08a" stroke="#eab308" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>

          ⭐ お気に入り問題の復習（登録分のみ）
        </button>
      </li>
    </ul>
  </div>

  <div id="quiz-screen" style="display: none;">
    <div class="quiz-sub-header">
      <div class="quiz-header-left">
        <span id="stage-title" class="stage-badge">STAGE</span>
        <div class="progress-container">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="progress-text" class="progress-text">0 / 0</div>
      </div>
      <button id="favorite-toggle" class="favorite-btn" onclick="toggleFavorite()">★</button>
    </div>

    <div id="case-text" class="case-box">問題文がここに読み込まれます。</div>

    <div id="choices-container" class="choices-grid"></div>

    <div id="feedback-container" class="feedback-box hidden">
      <div id="result-status"></div>
      <div style="font-weight: bold; margin-bottom: 4px; color: #475569;">💡 ベイマックスの解説:</div>
      <div id="evidence-text"></div>
    </div>

    <div class="button-group">
      <div class="nav-buttons">
        <button id="prev-btn" class="action-btn prev-button" onclick="prevQuestion()">⬅ 1つ前へ</button>
        <button id="next-btn" class="action-btn next-button" onclick="nextQuestion()">次の問題へ ➔</button>
      </div>
      <button class="action-btn back-btn" onclick="showMenu()">目次画面に戻る</button>
    </div>
  </div>

</div>

<!-- 🌐 検索モーダル（ポップアップウィンドウ構造） -->
<div id="searchModal" class="modal-overlay" onclick="closeSearchModalViaOverlay(event)">
  <div class="modal-content">
    <button class="modal-close-btn" onclick="closeSearchModal()">&times;</button>
    <h3 style="margin-top:0; color:#df4736; border-bottom:2px solid #e2e8f0; padding-bottom:10px; font-size:18px; text-align:left;">📋 現在の領域から検索・参照</h3>
    
    <input type="text" id="modalSearchInput" class="modal-search-input" placeholder="問題番号、薬剤名、疾患キーワードで高速検索...">
    <div style="font-size: 13px; color: #64748b; font-weight: bold; padding-left: 2px;">
      該当件数: <span id="modalMatchCount" style="color:#0ea5e9;">0</span> / <span id="modalTotalCount">0</span> 問
    </div>
    
    <div id="modalQuizList" class="modal-scroll-area">
      <!-- 検索結果がここに動的生成されます -->
    </div>
  </div>
</div>

<script>
  let questions = [];
  let currentQuestionIndex = 0;
  let currentFileName = "";
  let score = 0;
  let isReviewMode = false;
  let answeredStatus = [];

  let favorites = JSON.parse(localStorage.getItem('med_quiz_favorites')) || {};

  const menuScreen = document.getElementById('menu-screen');
  const quizScreen = document.getElementById('quiz-screen');
  const bearBalloon = document.getElementById('bear-balloon');
  const stageTitle = document.getElementById('stage-title');
  const progressText = document.getElementById('progress-text');
  const progressBar = document.getElementById('progress-bar');
  const caseText = document.getElementById('case-text');
  const choicesContainer = document.getElementById('choices-container');
  const feedbackContainer = document.getElementById('feedback-container');
  const resultStatus = document.getElementById('result-status');
  const evidenceText = document.getElementById('evidence-text');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  const favToggle = document.getElementById('favorite-toggle');
  const searchTrigger = document.getElementById('search-trigger');

  function showMenu() {
    quizScreen.style.display = 'none';
    menuScreen.style.display = 'block';
    searchTrigger.style.display = 'none';
    bearBalloon.textContent = "こんにちは、私はベイマックス。どの領域のクイズに挑戦しますか？";
  }

  async function startQuiz(jsonFileName) {
    try {
      const response = await fetch(jsonFileName);
      if (!response.ok) throw new Error(`ファイルが見つかりません`);
      questions = await response.json();
      currentFileName = jsonFileName;
      
      const savedIndex = localStorage.getItem(`progress_${currentFileName}`);
      const savedStatus = localStorage.getItem(`status_${currentFileName}`);
      
      let startIdx = 0;
      if (savedIndex !== null) {
        if (confirm("前回の続きから再開しますか？")) {
          startIdx = parseInt(savedIndex);
          answeredStatus = JSON.parse(savedStatus) || new Array(questions.length).fill(null);
        } else {
          answeredStatus = new Array(questions.length).fill(null);
        }
      } else {
        answeredStatus = new Array(questions.length).fill(null);
      }
      
      isReviewMode = false;
      initQuizStatus(startIdx);
    } catch (error) {
      alert(error.message);
    }
  }

  function initQuizStatus(startIndex = 0) {
    let targetIndex = startIndex;
    const savedStatus = JSON.parse(localStorage.getItem(`status_${currentFileName}`)) || [];
    while (targetIndex < questions.length && savedStatus[targetIndex] !== null && savedStatus[targetIndex] !== undefined) {
      targetIndex++;
    }
    currentQuestionIndex = (targetIndex >= questions.length) ? questions.length - 1 : targetIndex;
    score = 0;
    menuScreen.style.display = 'none';
    quizScreen.style.display = 'block';
    searchTrigger.style.display = 'flex';
    loadQuestion();
  }

  function loadQuestion() {const currentKey = `${currentFileName}_${currentQuestionIndex}`;
  if (favorites[currentKey]) {
    favToggle.textContent = "★"; // お気に入り済みなら塗りつぶし
    favToggle.style.color = "#fbbf24";
  } else {
    favToggle.textContent = "☆"; // 未登録なら枠線
    favToggle.style.color = "#94a3b8";
  }
    localStorage.setItem(`progress_${currentFileName}`, currentQuestionIndex);
    feedbackContainer.classList.add('hidden');
    choicesContainer.innerHTML = '';
    
    bearBalloon.textContent = "この症例を分析しました。適切な対応を1つ選択してください。";
    const currentQuestion = questions[currentQuestionIndex];
    prevBtn.disabled = (currentQuestionIndex === 0);
    
    const savedAnswers = JSON.parse(localStorage.getItem(`status_${currentFileName}`)) || [];
    answeredStatus = savedAnswers;
    const currentAns = answeredStatus[currentQuestionIndex];

    stageTitle.textContent = currentQuestion.stage || "実践問題";
    progressText.textContent = `${currentQuestionIndex + 1} / ${questions.length}`;
    progressBar.style.width = `${((currentQuestionIndex + 1) / questions.length) * 100}%`;
    caseText.textContent = currentQuestion.case;

    currentQuestion.choices.forEach(choice => {
      const button = document.createElement('button');
      button.className = 'choice-button';
      button.textContent = choice;
      button.onclick = () => selectAnswer(choice.trim().charAt(0), button);
      choicesContainer.appendChild(button);
    });

    if (currentAns) {
      restoreAnswer(currentAns);
      resultStatus.innerHTML = currentAns.isCorrect ? '<span style="color:green;">💮 正解</span>' : '<span style="color:red;">◆ 不正解</span>';
      evidenceText.textContent = currentQuestion.evidence;
      feedbackContainer.classList.remove('hidden');
      nextBtn.disabled = false;
    } else {
      nextBtn.disabled = true;
    }
  }

  function selectAnswer(selectedLetter, selectedButton) {
    const currentQuestion = questions[currentQuestionIndex];
    const isCorrect = (selectedLetter === currentQuestion.correct);
    answeredStatus[currentQuestionIndex] = { selectedLetter, isCorrect };
    localStorage.setItem(`status_${currentFileName}`, JSON.stringify(answeredStatus));
    displayFeedback(isCorrect, selectedButton, currentQuestion.correct);
  }

  function displayFeedback(isCorrect, selectedButton, correctLetter) {
    const buttons = choicesContainer.querySelectorAll('.choice-button');
    buttons.forEach(btn => {
      btn.disabled = true;
      if (btn.textContent.trim().charAt(0) === correctLetter) btn.classList.add('correct-flash');
    });
    if (!isCorrect && selectedButton) selectedButton.classList.add('wrong-flash');
    resultStatus.innerHTML = isCorrect ? '<span style="color:green;">💮 正解</span>' : '<span style="color:red;">◆ 不正解</span>';
    evidenceText.textContent = questions[currentQuestionIndex].evidence;
    feedbackContainer.classList.remove('hidden');
    nextBtn.disabled = false;
  }

  function restoreAnswer(ans) {
    const buttons = choicesContainer.querySelectorAll('.choice-button');
    buttons.forEach(btn => {
      btn.disabled = true;
      if (btn.textContent.trim().charAt(0) === questions[currentQuestionIndex].correct) btn.classList.add('correct-flash');
      if (btn.textContent.trim().charAt(0) === ans.selectedLetter && !ans.isCorrect) btn.classList.add('wrong-flash');
    });
  }

  function nextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex < questions.length) {
      loadQuestion();
    } else {
      localStorage.removeItem(`progress_${currentFileName}`);
      bearBalloon.textContent = "全問完了です！";
    }
  }

  function prevQuestion() {
    if (currentQuestionIndex > 0) {
      currentQuestionIndex--;
      loadQuestion();
    }
  }

  function jumpToQuestion(index) {
    closeSearchModal();
    menuScreen.style.display = 'none';
    quizScreen.style.display = 'block';
    searchTrigger.style.display = 'flex';
    currentQuestionIndex = index;
    loadQuestion();
  }

  function openSearchModal() {
    const modal = document.getElementById('searchModal');
    modal.classList.add('show');
    document.getElementById('modalTotalCount').textContent = questions.length;
    renderModalList(questions);
    document.getElementById('modalSearchInput').focus();
  }

  function closeSearchModal() {
    document.getElementById('searchModal').classList.remove('show');
    document.getElementById('modalSearchInput').value = '';
  }

  function renderModalList(items) {
    const listContainer = document.getElementById('modalQuizList');
    document.getElementById('modalMatchCount').textContent = items.length;
    listContainer.innerHTML = '';
    if (items.length === 0) {
      listContainer.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:30px; font-weight:bold;">一致する問題が見つかりません。</div>';
      return;
    }
    items.forEach((item) => {
      const isKinqi = item.case.includes('禁忌') || item.case.includes('尿閉') || item.case.includes('ショック');
      const itemDiv = document.createElement('div');
      itemDiv.className = `m-quiz-item ${isKinqi ? 'kinqi' : ''}`;
      itemDiv.innerHTML = `
        <div class="m-quiz-header">
          <span class="m-quiz-stage">${item.stage || '実践問題'}</span>
          <button class="m-quiz-start-btn" onclick="jumpToQuestion(${questions.indexOf(item)})">この問題から解く</button>
        </div>
        <div class="m-quiz-case">${item.case}</div>
        <div class="m-quiz-evidence"><strong>【解説】</strong> ${item.evidence}</div>
      `;
      listContainer.appendChild(itemDiv);
    });
  }

  document.getElementById('modalSearchInput').addEventListener('input', function(e) {
    const keyword = e.target.value.toLowerCase().trim();
    if (!keyword) { renderModalList(questions); return; }
    const filtered = questions.filter(item => {
      const stageMatch = item.stage ? item.stage.toLowerCase().includes(keyword) : false;
      return stageMatch || item.case.toLowerCase().includes(keyword) || item.evidence.toLowerCase().includes(keyword);
    });
    renderModalList(filtered);
  });
  // --- ここから追加 ---
  favToggle.addEventListener('click', () => {
    const currentKey = `${currentFileName}_${currentQuestionIndex}`;
    
    if (favorites[currentKey]) {
      // お気に入りを解除
      delete favorites[currentKey];
      favToggle.textContent = "☆";
      favToggle.style.color = "#94a3b8";
    } else {
      // お気に入りに追加
      favorites[currentKey] = {
        fileName: currentFileName,
        index: currentQuestionIndex,
        case: questions[currentQuestionIndex].case
      };
      favToggle.textContent = "★";
      favToggle.style.color = "#fbbf24";
    }
    
    // localStorageに保存
    localStorage.setItem('med_quiz_favorites', JSON.stringify(favorites));
  });
  // --- ここまで追加 ---
  // --- お気に入り復習機能の追加 ---
  async function startReviewMode() {
    const favData = JSON.parse(localStorage.getItem('med_quiz_favorites'));
    if (!favData || Object.keys(favData).length === 0) {
      alert("お気に入りに登録された問題がありません。");
      return;
    }

    // お気に入りから質問リストを構築
    const favoriteKeys = Object.keys(favData);
    
    // 一つのJSONファイルだけでなく、複数のファイルにまたがる可能性があるため、
    // まず必要なデータを各ファイルから取得する処理が必要ですが、
    // 今回は簡易的に「お気に入りデータ内の各問題」をリストとして扱います
    
    // 復習用のダミー的な配列を作成
    questions = favoriteKeys.map(key => ({
      ...favData[key],
      // 実際にはここでお気に入り時のデータを復元
      // 注意: questionsが別ファイルの場合、本来は再fetchが必要ですが、
      // 簡易版として、保存した情報をもとにします
    }));

    // 本来は各JSONファイルを再読み込みして全データと照合すべきですが、
    // 構造を維持するため、現在の実装を活かします
    alert("お気に入り問題の復習を開始します。該当の疾患領域から解き直してください。");
    // ※今回は複雑化を避けるため、各JSONのIDに基づいた再読み込みは省略し、
    // 登録された個別の問題にジャンプする仕組みがベストです。
    
    renderReviewList(favData);
  }

  function renderReviewList(favData) {
    const modal = document.getElementById('searchModal');
    const listContainer = document.getElementById('modalQuizList');
    
    modal.classList.add('show');
    listContainer.innerHTML = '<h3>⭐ お気に入り問題一覧</h3>';
    
    Object.keys(favData).forEach(key => {
      const item = favData[key];
      const itemDiv = document.createElement('div');
      itemDiv.className = 'm-quiz-item';
      itemDiv.innerHTML = `
        <div class="m-quiz-case">${item.case}</div>
        <button class="m-quiz-start-btn" onclick="loadFavoriteAndStart('${item.fileName}', ${item.index})">この問題を解く</button>
      `;
      listContainer.appendChild(itemDiv);
    });
  }

  // お気に入りから特定のファイルを読み込んで開始する関数
  async function loadFavoriteAndStart(fileName, index) {
    await startQuiz(fileName);
    currentQuestionIndex = index;
    loadQuestion();
    closeSearchModal();
  }

</script>
</body>
